name: Unit Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore windows-cs/LangSwitcher.Tests/LangSwitcher.Tests.csproj

      - name: Run Tests and Publish Debug
        run: |
          dotnet publish windows-cs/LangSwitcher.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o windows-cs/out > publish.log 2>&1
          dir windows-cs\out >> publish.log 2>&1
          dotnet test windows-cs/LangSwitcher.Tests/LangSwitcher.Tests.csproj --no-restore --verbosity normal > test.log 2>&1
          if ($LASTEXITCODE -ne 0 -or !(Test-Path windows-cs\out\LangSwitcher.exe)) {
            git config --global user.name "github-actions"
            git config --global user.email "github-actions@github.com"
            git add test.log publish.log
            git commit -m "Upload debug logs"
            git push origin HEAD:main
            exit 1
          }
