name: Unit Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore windows-cs/LangSwitcher.Tests/LangSwitcher.Tests.csproj

      - name: Run Tests
        run: |
          dotnet test windows-cs/LangSwitcher.Tests/LangSwitcher.Tests.csproj --no-restore --verbosity normal > test.log 2>&1
          if ($LASTEXITCODE -ne 0) {
            git config --global user.name "github-actions"
            git config --global user.email "github-actions@github.com"
            git add test.log
            git commit -m "Upload test log"
            git push origin HEAD:main
            exit 1
          }
