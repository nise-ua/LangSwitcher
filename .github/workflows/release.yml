name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build macOS app
        run: |
          cd native
          ./build.sh
          # Create a zip of the app preserving file permissions
          zip -ry ../LangSwitcher-macOS-${{ github.ref_name }}.zip LangSwitcher.app

      - name: Upload Mac Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LangSwitcher-macOS
          path: LangSwitcher-macOS-${{ github.ref_name }}.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build Windows exe
        run: |
          cd windows-cs
          dotnet publish LangSwitcher.csproj -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -o out
          move out\LangSwitcher.exe ..\LangSwitcher-Windows-${{ github.ref_name }}.exe

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LangSwitcher-Windows
          path: LangSwitcher-Windows-${{ github.ref_name }}.exe

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download Mac Artifact
        uses: actions/download-artifact@v4
        with:
          name: LangSwitcher-macOS

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: LangSwitcher-Windows

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            LangSwitcher-macOS-${{ github.ref_name }}.zip
            LangSwitcher-Windows-${{ github.ref_name }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
