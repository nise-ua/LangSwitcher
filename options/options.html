<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangSwitcher Settings</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <main>
    <h1>LangSwitcher Settings</h1>
    <p>Select which languages are enabled for auto-correction.</p>

    <form id="lang-form">
      <label><input type="checkbox" value="en" /> English (EN)</label>
      <label><input type="checkbox" value="ru" /> Russian (RU)</label>
      <label><input type="checkbox" value="ua" /> Ukrainian (UA)</label>

      <button type="submit">Save</button>
      <p id="status" role="status" aria-live="polite"></p>
    </form>
  </main>

  <script src="options.js"></script>
</body>
</html>
